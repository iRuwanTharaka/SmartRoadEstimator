version: '3.8'

services:
  # ─── PostgreSQL Database ──────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: sre-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_road_estimator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js Backend ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sre-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@db:5432/smart_road_estimator?schema=public
      JWT_SECRET: change-this-in-production-to-a-long-random-string
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: change-this-refresh-secret-too
      JWT_REFRESH_EXPIRES_IN: 7d
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_TIMEOUT: 30000
      AI_SERVICE_RETRIES: 3
      CORS_ORIGIN: '*'
    ports:
      - '5000:5000'
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:5000/health']
      interval: 15s
      timeout: 5s
      retries: 3

  # ─── Python AI Microservice ───────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: sre-ai-service
    restart: unless-stopped
    ports:
      - '8000:8000'
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
